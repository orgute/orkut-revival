name: Build, Verify & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_db_check:
        description: 'Run DB health check only (no deploy)'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: DB health check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/db-check.js

      - name: Build
        if: ${{ github.event.inputs.run_db_check != 'true' }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Vercel CLI
        if: ${{ github.event.inputs.run_db_check != 'true' }}
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        if: ${{ github.event.inputs.run_db_check != 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          OUTPUT=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[a-z0-9_-]+\.vercel\.app' | tail -1)
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 LIVE AT: $URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
