name: Build, Verify & Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: DB health check
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/db-check.cjs

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SITE_URL: https://orkut-revival-app.vercel.app
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Create Vercel project config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          # Get org ID from token
          ORG_ID=$(curl -sf https://api.vercel.com/v2/user \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('user',{}).get('id',''))")
          echo "Org ID: $ORG_ID"
          printf '{"projectId":"%s","orgId":"%s"}' "$VERCEL_PROJECT_ID" "$ORG_ID" > .vercel/project.json
          cat .vercel/project.json

      - name: Deploy prebuilt to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN --yes
          echo "🌐 https://orkut-revival-app.vercel.app"
