name: Build, Verify & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: DB health check
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/db-check.js

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel + pin stable alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Deploy and grab the unique preview URL
          DEPLOY_URL=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1 \
            | grep -oE 'https://orkut-revival-[a-z0-9]+-[a-z0-9-]+\.vercel\.app' | head -1)

          echo "Preview URL: $DEPLOY_URL"

          # Pin stable alias — overwrite whatever was there before
          vercel alias set "$DEPLOY_URL" orkut-revival.vercel.app \
            --token=$VERCEL_TOKEN --yes

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🌐 https://orkut-revival.vercel.app"
          echo "   (aliased to $DEPLOY_URL)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
