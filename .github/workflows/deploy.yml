name: Build & Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Link or create Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # vercel link creates .vercel/project.json with org+project IDs
          vercel link --yes --token=$VERCEL_TOKEN || true
          cat .vercel/project.json 2>/dev/null || echo "no project file yet"

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(vercel deploy --prod --token=$VERCEL_TOKEN --yes 2>&1 | grep -oE 'https://[^ ]+\.vercel\.app' | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Live at: $URL"
