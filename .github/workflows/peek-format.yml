name: Peek Community File Format

on:
  workflow_dispatch:

jobs:
  peek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Peek at file format
        run: node scripts/peek-format.cjs 2>&1
