<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orgute — Nova Senha</title>
  <style>
    body { font-family: Verdana, sans-serif; background: #dce3f0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; margin: 0; padding: 24px; box-sizing: border-box; }
    .card { background: #fff; border: 1px solid #c8d0e0; border-radius: 3px;
      padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 2px 20px rgba(0,0,0,.1); }
    .logo { font-size: 38px; font-family: Georgia, serif; color: #e8197d; margin-bottom: 4px; }
    h2 { color: #2a3f6f; font-size: 16px; margin: 0 0 20px; font-weight: 700; }
    input { width: 100%; border: 1px solid #c8d0e0; border-radius: 2px; padding: 9px 10px;
      font-family: Verdana, sans-serif; font-size: 13px; color: #2a3f6f;
      background: #f8f9fc; box-sizing: border-box; margin-bottom: 10px; outline: none; }
    input:focus { border-color: #2a3f6f; background: #fff; }
    button { width: 100%; background: #e8197d; color: #fff; border: none; border-radius: 2px;
      padding: 10px; font-family: Verdana, sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-top: 6px; }
    button:hover { background: #cc1570; }
    button:disabled { background: #9aa0b0; cursor: default; }
    .msg { font-size: 12px; margin-top: 10px; padding: 8px 10px; border-radius: 2px; }
    .msg.err { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6c6; }
    .msg.ok { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .back { font-size: 11px; color: #8a94a8; margin-top: 16px; text-align: center; }
    .back a { color: #e8197d; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Oi</div>
  <h2>criar nova senha</h2>
  <input type="password" id="pwd" placeholder="nova senha (mín. 6 caracteres)"/>
  <input type="password" id="pwd2" placeholder="confirmar nova senha"/>
  <button id="btn" onclick="save()">salvar nova senha</button>
  <div id="msg"></div>
  <div class="back"><a href="/">← voltar para o Orgute</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPA_URL = 'https://uakmvwwgtjrwdymfwtrf.supabase.co'
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVha212d3dndGpyd2R5bWZ3dHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDcyMzYsImV4cCI6MjA5NTcyMzIzNn0.K_y8XXzh7N-M-aks5WLXn3_FWzxrsBEZ12-Y82_24po'
  const client = supabase.createClient(SUPA_URL, SUPA_KEY)

  // Exchange the code/token from URL
  async function init() {
    const hash = window.location.hash
    const params = new URLSearchParams(window.location.search)
    
    // Handle both implicit (#access_token) and PKCE (?code=) flows
    if (hash.includes('access_token')) {
      await client.auth.getSession()
    } else if (params.get('code')) {
      await client.auth.exchangeCodeForSession(params.get('code'))
    }
  }
  init()

  async function save() {
    const pwd = document.getElementById('pwd').value
    const pwd2 = document.getElementById('pwd2').value
    const msg = document.getElementById('msg')
    const btn = document.getElementById('btn')
    msg.innerHTML = ''
    if (pwd.length < 6) { msg.className='msg err'; msg.textContent='Senha deve ter pelo menos 6 caracteres.'; return }
    if (pwd !== pwd2) { msg.className='msg err'; msg.textContent='As senhas não coincidem.'; return }
    btn.disabled = true; btn.textContent = 'Salvando…'
    const { error } = await client.auth.updateUser({ password: pwd })
    if (error) {
      msg.className='msg err'; msg.textContent='Erro: ' + error.message
      btn.disabled = false; btn.textContent = 'salvar nova senha'
    } else {
      msg.className='msg ok'; msg.textContent='Senha alterada! Redirecionando…'
      setTimeout(() => window.location.href = '/', 1500)
    }
  }
</script>
</body>
</html>
